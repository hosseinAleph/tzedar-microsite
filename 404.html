<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect:
      // Encode the full path + query + hash into a query parameter,
      // then redirect to index.html so the React app can restore it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(
          l.pathname.slice(l.pathname.split('/').slice(0, 2).join('/').length) +
          (l.search ? l.search : '') +
          (l.hash ? l.hash : '')
        )
      );
    </script>
  </head>
  <body></body>
</html>
